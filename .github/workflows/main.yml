name: Build Safari Extension

on:
  workflow_dispatch:

jobs:
  build-mac-app:
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert to Safari App
        run: |
          xcrun safari-web-extension-converter ./0.3.4_0 --project-location ./safari-build --app-name "MySafariExt" --no-prompt --bundle-identifier com.yourname.ext
          
      - name: Build macOS App
        run: |
          cd safari-build/MySafariExt
          
          # 兼容性编译
          xcodebuild -project "MySafariExt.xcodeproj" -scheme "MySafariExt (macOS)" -configuration Release SYMROOT="$(pwd)/build" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=10.15 ARCHS="x86_64 arm64"
          
          # 【本次核心修复】使用 Mac 原生的 ditto 命令进行完美打包，锁死所有结构和权限！
          cd build/Release
          ditto -c -k --keepParent MySafariExt.app MySafariExt_Perfect.zip
          
      - name: Upload App for Download
        uses: actions/upload-artifact@v4
        with:
          name: MySafariExt-Artifact
          # 提取我们用 ditto 完美打包好的 zip
          path: safari-build/MySafariExt/build/Release/MySafariExt_Perfect.zip
