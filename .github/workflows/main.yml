name: Build Safari Extension DMG

on:
  workflow_dispatch:

jobs:
  build-mac-app:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Convert to Safari App
        run: |
          xcrun safari-web-extension-converter ./0.3.4_0 --project-location ./safari-build --app-name "MySafariExt" --no-prompt --bundle-identifier com.yourname.ext
          
      - name: Build macOS App
        run: |
          cd safari-build/MySafariExt
          
          # 1. 兼容性编译
          xcodebuild -project "MySafariExt.xcodeproj" -scheme "MySafariExt (macOS)" -configuration Release SYMROOT="$(pwd)/build" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=12.0 ARCHS="x86_64 arm64"
          
          # 2. 强制篡改版本号为 12.0
          APP_PATH="build/Release/MySafariExt.app"
          EXT_PATH="$APP_PATH/Contents/PlugIns/MySafariExt Extension.appex"
          plutil -replace LSMinimumSystemVersion -string "12.0" "$APP_PATH/Contents/Info.plist"
          plutil -replace LSMinimumSystemVersion -string "12.0" "$EXT_PATH/Contents/Info.plist"
          
          # 3. 【绝对杀手锏】调用 Mac 底层命令，将 App 封装进 DMG 磁盘映像！
          cd build/Release
          hdiutil create -volname "MySafariExt" -srcfolder "MySafariExt.app" -ov -format UDZO MySafariExt.dmg
          
      - name: Upload DMG for Download
        uses: actions/upload-artifact@v4
        with:
          name: MySafariExt-DMG
          # 提取打包好的 DMG 文件给你
          path: safari-build/MySafariExt/build/Release/MySafariExt.dmg
