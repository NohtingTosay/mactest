name: Build Safari Extension

on:
  workflow_dispatch:

jobs:
  build-mac-app:
    # 【核心修改 1】强行指定使用旧版 macOS 13 服务器
    runs-on: macos-13
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode 14.2
        # 【核心修改 2】强行指定使用完美匹配你系统的 Xcode 14.2 进行编译
        run: sudo xcode-select -s /Applications/Xcode_14.2.app/Contents/Developer

      - name: Convert to Safari App
        run: |
          xcrun safari-web-extension-converter ./0.3.4_0 --project-location ./safari-build --app-name "MySafariExt" --no-prompt --bundle-identifier com.yourname.ext
          
      - name: Build macOS App
        run: |
          cd safari-build/MySafariExt
          
          # 使用原生兼容你系统的参数编译
          xcodebuild -project "MySafariExt.xcodeproj" -scheme "MySafariExt (macOS)" -configuration Release SYMROOT="$(pwd)/build" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO MACOSX_DEPLOYMENT_TARGET=12.0 ARCHS="x86_64 arm64"
          
          # 完美打包，锁死权限
          cd build/Release
          ditto -c -k --keepParent MySafariExt.app MySafariExt_Perfect.zip
          
      - name: Upload App for Download
        uses: actions/upload-artifact@v4
        with:
          name: MySafariExt-Artifact
          path: safari-build/MySafariExt/build/Release/MySafariExt_Perfect.zip
